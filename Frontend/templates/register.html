<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scriptly — Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
        .input-field {
            width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0;
            border-radius: 10px; font-size: 15px; transition: all 0.3s; outline: none;
        }
        .input-field:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .btn-primary {
            width: 100%; padding: 13px; background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border: none; border-radius: 10px; font-size: 16px;
            font-weight: 600; cursor: pointer; transition: all 0.3s;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(102,126,234,0.4); }
        .error-msg { background: #fff5f5; border: 1px solid #feb2b2; color: #c53030; padding: 12px; border-radius: 8px; font-size: 14px; }
        .success-msg { background: #f0fff4; border: 1px solid #9ae6b4; color: #276749; padding: 12px; border-radius: 8px; font-size: 14px; }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <div class="glass rounded-2xl shadow-2xl w-full max-w-md p-8">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4" style="background: linear-gradient(135deg, #667eea, #764ba2)">
                <span class="text-white text-2xl">📔</span>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">Join Scriptly</h1>
            <p class="text-gray-500 mt-1">Start your mental wellness journey</p>
        </div>

        <div id="error-msg" class="error-msg mb-4 hidden"></div>
        <div id="success-msg" class="success-msg mb-4 hidden"></div>

        <form id="register-form">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">First Name</label>
                    <input type="text" id="first_name" class="input-field" placeholder="Lagnajita">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Last Name</label>
                    <input type="text" id="last_name" class="input-field" placeholder="Das">
                </div>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                <input type="text" id="username" class="input-field" placeholder="lagnajita" required>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                <input type="email" id="email" class="input-field" placeholder="you@example.com" required>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <input type="password" id="password" class="input-field" placeholder="Min 8 characters" required>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
                <input type="password" id="password2" class="input-field" placeholder="Repeat password" required>
            </div>
            <button type="submit" class="btn-primary" id="register-btn">
                Create Account
            </button>
        </form>

        <p class="text-center mt-6 text-gray-600 text-sm">
            Already have an account?
            <a href="login.html" class="font-semibold" style="color: #667eea">Sign in</a>
        </p>
    </div>

    <script src="../static/js/api.js"></script>
    <script src="../static/js/auth.js"></script>
</body>
</html>
